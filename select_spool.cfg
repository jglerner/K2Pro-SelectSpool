# K2Pro-SelectSpool
# Place this file in your Klipper config directory and add:
#   [include select_spool.cfg]
# to your printer.cfg

[gcode_macro SELECT_SPOOL]
description: Heat to 240°C, wind out old filament, wind in spool T=0,1,2 or 3
gcode:
    {% set t = params.T|default(-1)|int %}
    {% set swap_temp = 240 %}

    {% if t not in [0, 1, 2, 3] %}
        { action_raise_error("SELECT_SPOOL: T must be 0, 1, 2 or 3") }
    {% endif %}

    # Heat extruder to filament swap temperature
    M117 Heating for spool swap...
    M104 S{swap_temp}
    M109 S{swap_temp}

    # CFS unwinds old filament and winds in the selected spool
    M117 Swapping to spool T{t}...
    {% if t == 0 %}
        T0
    {% elif t == 1 %}
        T1
    {% elif t == 2 %}
        T2
    {% elif t == 3 %}
        T3
    {% endif %}

    M117 Active spool: T{t}
    {action_respond_info("SELECT_SPOOL: switched to T%d" % t)}
